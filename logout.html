<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerrar Sesión - BIO-LAB</title>
    
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app-dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        /* Estilo para centrar la caja de logout en la pantalla */
        #logout-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <script src="assets/static/js/initTheme.js"></script>
    
    <div id="logout-container">
        <div class="col-md-5 col-sm-12 px-4">
            <div class="card shadow-lg">
                <div class="card-body text-center p-5">
                    <!-- Icono de Salida -->
                    <div class="mb-4">
                        <i class="bi bi-box-arrow-right text-danger" style="font-size: 4rem;"></i>
                    </div>
                    
                    <h2 class="fw-bold">¿Cerrar Sesión?</h2>
                    <p class="text-muted mb-4">Estás a punto de salir del sistema BIO-LAB. Asegúrate de haber guardado todos los cambios en los resultados de los pacientes.</p>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-center">
                        <!-- Botón para volver al Index (Cancelar) -->
                        <a href="index.html" class="btn btn-light-secondary btn-lg px-4 me-md-2">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                        <!-- Botón para ir al Login (Confirmar) -->
                        <a href="login.html" class="btn btn-danger btn-lg px-4">
                            Salir del Sistema
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4 text-muted">
                <p>2026 &copy; BIO-LAB | Seguridad del Laboratorio</p>
            </div>
        </div>
    </div>

    <script src="assets/static/js/components/dark.js"></script>
</body>

</html>
