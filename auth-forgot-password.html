<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso - BIO-LAB</title>
    <link rel="shortcut icon" href="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2033%2034'%20fill-rule='evenodd'%20stroke-linejoin='round'%20stroke-miterlimit='2'%20xmlns:v='https://vecta.io/nano'%3e%3cpath%20d='M3%2027.472c0%204.409%206.18%205.552%2013.5%205.552%207.281%200%2013.5-1.103%2013.5-5.513s-6.179-5.552-13.5-5.552c-7.281%200-13.5%201.103-13.5%205.513z'%20fill='%23435ebe'%20fill-rule='nonzero'/%3e%3ccircle%20cx='16.5'%20cy='8.8'%20r='8.8'%20fill='%2341bbdd'/%3e%3c/svg%3e" type="image/x-icon">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app-dark.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/auth.css">
</head>

<body>
    <script src="assets/static/js/initTheme.js"></script>
    <div id="auth">
        <div class="row h-100">
            <div class="col-lg-5 col-12">
                <div id="auth-left">
                    <div class="auth-logo mb-4">
                        <a href="auth-login.html" style="font-size: 2rem; font-weight: 700; text-decoration: none; color: #435ebe;">
                            <i class="bi bi-droplet-blood text-danger"></i> BIO-LAB
                        </a>
                    </div>
                    <h1 class="auth-title" style="font-size: 2.2rem;">Recuperar Acceso</h1>
                    <p class="auth-subtitle mb-5">Verifica tu identidad respondiendo a tu pregunta de seguridad.</p>

                    <form action="recovery_process.php" method="POST">
                        <!-- Identificar al usuario -->
                        <div class="form-group position-relative has-icon-left mb-4">
                            <input type="text" name="username" class="form-control form-control-xl" placeholder="Nombre de usuario" required>
                            <div class="form-control-icon">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>

                        <!-- Pregunta de seguridad -->
                        <div class="form-group mb-4">
                            <label class="form-label text-gray-600">Pregunta de Seguridad</label>
                            <select class="form-select form-control-xl" name="security_question">
                                <option value="1">¿Cuál es el nombre de tu primera mascota?</option>
                                <option value="2">¿Cuál es tu color favorito?</option>
                                <option value="3">¿Nombre de tu escuela primaria?</option>
                            </select>
                        </div>

                        <!-- Respuesta -->
                        <div class="form-group position-relative has-icon-left mb-4">
                            <input type="password" name="security_answer" class="form-control form-control-xl" placeholder="Tu respuesta secreta" required>
                            <div class="form-control-icon">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-3">Verificar Identidad</button>
                    </form>
                    
                    <div class="text-center mt-5 text-lg fs-4">
                        <p class='text-gray-600'>¿Recordaste tu clave? <a href="auth-login.html" class="font-bold">Iniciar Sesión</a>.</p>
                        <p class="text-sm text-muted">Nota: Si no puedes recuperar el acceso, solicita ayuda al administrador del laboratorio.</p>
                    </div>
                </div>
            </div>
            
            <!-- Lado derecho estético igual al Login -->
            <div class="col-lg-7 d-none d-lg-block">
                <div id="auth-right" style="background: linear-gradient(145deg, #435ebe 0%, #2e438e 100%); display: flex; align-items: center; justify-content: center;">
                     <div class="text-center text-white">
                        <i class="bi bi-shield-check" style="font-size: 10rem; opacity: 0.2;"></i>
                        <h2 class="text-white mt-4" style="font-weight: 300;">Seguridad BIO-LAB</h2>
                     </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
