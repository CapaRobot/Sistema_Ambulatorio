<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BIO-LAB</title>
    
    <!-- Favicon Unificado -->
    <link rel="shortcut icon" href="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2033%2034'%20fill-rule='evenodd'%20stroke-linejoin='round'%20stroke-miterlimit='2'%20xmlns:v='https://vecta.io/nano'%3e%3cpath%20d='M3%2027.472c0%204.409%206.18%205.552%2013.5%205.552%207.281%200%2013.5-1.103%2013.5-5.513s-6.179-5.552-13.5-5.552c-7.281%200-13.5%201.103-13.5%205.513z'%20fill='%23435ebe'%20fill-rule='nonzero'/%3e%3ccircle%20cx='16.5'%20cy='8.8'%20r='8.8'%20fill='%2341bbdd'/%3e%3c/svg%3e" type="image/x-icon">

    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app-dark.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/auth.css">
</head>

<body>
    <script src="assets/static/js/initTheme.js"></script>
    <div id="auth">
        <div class="row h-100">
            <div class="col-lg-5 col-12">
                <div id="auth-left">
                    <div class="auth-logo mb-4">
                        <!-- Logo BIO-LAB -->
                        <a href="index.html" style="font-size: 2rem; font-weight: 700; text-decoration: none; color: #435ebe;">
                            <i class="bi bi-droplet-blood text-danger"></i> BIO-LAB
                        </a>
                    </div>
                    <h1 class="auth-title">Ingresar.</h1>
                    <p class="auth-subtitle mb-5">Bienvenido al Sistema de Gestión de Laboratorio.</p>

                    <form action="index.html">
                        <div class="form-group position-relative has-icon-left mb-4">
                            <input type="text" class="form-control form-control-xl" placeholder="Nombre de usuario" required>
                            <div class="form-control-icon">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>
                        <div class="form-group position-relative has-icon-left mb-4">
                            <input type="password" class="form-control form-control-xl" placeholder="Contraseña" required>
                            <div class="form-control-icon">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                        </div>
                        <div class="form-check form-check-lg d-flex align-items-end">
                            <input class="form-check-input me-2" type="checkbox" value="" id="flexCheckDefault">
                            <label class="form-check-label text-gray-600" for="flexCheckDefault">
                                Mantener sesión iniciada
                            </label>
                        </div>
                        <button class="btn btn-primary btn-block btn-lg shadow-lg mt-5">Iniciar Sesión</button>
                    </form>

                    <!-- Sección de enlaces corregida -->
                    <div class="text-center mt-5 text-lg fs-4">
                        <p class='text-gray-600'>¿No tiene una cuenta? <a href="auth-register.html" class="font-bold">Registrarse</a>.</p>
                        <!-- ENLACE CORREGIDO AQUÍ -->
                        <p><a class="font-bold" href="auth-forgot-password.html">¿Olvidó su contraseña?</a></p>
                    </div>
                </div>
            </div>
            <div class="col-lg-7 d-none d-lg-block">
                <div id="auth-right" style="background: #435ebe; background: linear-gradient(145deg, #435ebe 0%, #2e438e 100%); display: flex; align-items: center; justify-content: center;">
                     <div class="text-center text-white">
                        <i class="bi bi-microscope" style="font-size: 10rem; opacity: 0.2;"></i>
                     </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
