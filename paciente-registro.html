<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-LAB - Registrar Paciente</title>
    
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app-dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <script src="assets/static/js/initTheme.js"></script>
    <div id="app">
        <div id="sidebar">
            <div class="sidebar-wrapper active">
                <div class="sidebar-header position-relative">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="logo">
                            <a href="index.html" style="font-size: 1.5rem; font-weight: 700;">
                                <i class="bi bi-droplet-blood text-danger"></i> BIO-LAB
                            </a>
                        </div>
                    </div>
                </div>
                <div class="sidebar-menu">
                    <ul class="menu">
                        <li class="sidebar-title">Principal</li>
                        <li class="sidebar-item">
                            <a href="index.html" class='sidebar-link'>
                                <i class="bi bi-grid-fill"></i>
                                <span>Panel de Control</span>
                            </a>
                        </li>
                        <li class="sidebar-title">Gestión de Pacientes</li>
                        <li class="sidebar-item active has-sub">
                            <a href="#" class='sidebar-link'>
                                <i class="bi bi-person-plus-fill"></i>
                                <span>Pacientes</span>
                            </a>
                            <ul class="submenu active">
                                <li class="submenu-item active">
                                    <a href="paciente-registro.html" class="submenu-link">Registrar Nuevo</a>
                                </li>
                                <li class="submenu-item">
                                    <a href="paciente-lista.html" class="submenu-link">Listado General</a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div id="main">
            <header class="mb-3">
                <a href="#" class="burger-btn d-block d-xl-none">
                    <i class="bi bi-justify fs-3"></i>
                </a>
            </header>
            
            <div class="page-heading">
                <div class="page-title">
                    <div class="row">
                        <div class="col-12 col-md-6 order-md-1 order-last">
                            <h3>Registro de Paciente</h3>
                            <p class="text-subtitle text-muted">Ingrese los datos básicos para abrir una nueva historia médica.</p>
                        </div>
                    </div>
                </div>

                <section id="multiple-column-form">
                    <div class="row match-height">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header">
                                    <h4 class="card-title">Información del Paciente</h4>
                                </div>
                                <div class="card-content">
                                    <div class="card-body">
                                        <form class="form" action="#">
                                            <div class="row">
                                                <!-- Datos Personales -->
                                                <div class="col-md-6 col-12">
                                                    <div class="form-group">
                                                        <label for="cedula">Cédula / ID</label>
                                                        <input type="text" id="cedula" class="form-control" placeholder="Ej: V-12345678" name="cedula" required>
                                                    </div>
                                                </div>
                                                <div class="col-md-6 col-12">
                                                    <div class="form-group">
                                                        <label for="nombre">Nombres</label>
                                                        <input type="text" id="nombre" class="form-control" placeholder="Nombres completos" name="nombre" required>
                                                    </div>
                                                </div>
                                                <div class="col-md-6 col-12">
                                                    <div class="form-group">
                                                        <label for="apellido">Apellidos</label>
                                                        <input type="text" id="apellido" class="form-control" placeholder="Apellidos completos" name="apellido" required>
                                                    </div>
                                                </div>
                                                <div class="col-md-3 col-12">
                                                    <div class="form-group">
                                                        <label for="fecha-nac">Fecha de Nacimiento</label>
                                                        <input type="date" id="fecha-nac" class="form-control" name="fecha-nac">
                                                    </div>
                                                </div>
                                                <div class="col-md-3 col-12">
                                                    <div class="form-group">
                                                        <label for="sexo">Sexo</label>
                                                        <select class="form-select" id="sexo">
                                                            <option value="M">Masculino</option>
                                                            <option value="F">Femenino</option>
                                                            <option value="O">Otro</option>
                                                        </select>
                                                    </div>
                                                </div>

                                                <!-- Datos de Contacto -->
                                                <div class="col-md-6 col-12">
                                                    <div class="form-group">
                                                        <label for="telefono">Teléfono</label>
                                                        <input type="text" id="telefono" class="form-control" placeholder="Número de contacto" name="telefono">
                                                    </div>
                                                </div>
                                                <div class="col-md-6 col-12">
                                                    <div class="form-group">
                                                        <label for="email">Correo Electrónico</label>
                                                        <input type="email" id="email" class="form-control" placeholder="usuario@correo.com" name="email">
                                                    </div>
                                                </div>
                                                
                                                <div class="col-12">
                                                    <div class="form-group">
                                                        <label for="direccion">Dirección</label>
                                                        <textarea class="form-control" id="direccion" rows="2"></textarea>
                                                    </div>
                                                </div>

                                                <div class="col-12 d-flex justify-content-end mt-3">
                                                    <button type="submit" class="btn btn-primary me-1 mb-1">Registrar Paciente</button>
                                                    <button type="reset" class="btn btn-light-secondary me-1 mb-1">Limpiar</button>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <footer>
                <div class="footer clearfix mb-0 text-muted">
                    <div class="float-start">
                        <p>2026 &copy; BIO-LAB</p>
                    </div>
                    <div class="float-end">
                        <p>Módulo de Recepción</p>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <script src="assets/static/js/components/dark.js"></script>
    <script src="assets/extensions/perfect-scrollbar/perfect-scrollbar.min.js"></script>
    <script src="assets/compiled/js/app.js"></script>
</body>

</html>
