<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - BIO-LAB</title>
    
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app-dark.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/iconly.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <script src="assets/static/js/initTheme.js"></script>
    <div id="app">
        <!-- SIDEBAR (Igual al index, activo en Configuración) -->
        <div id="sidebar">
            <!-- ... (Mismo contenido del sidebar que el index) ... -->
            <!-- Asegúrate de poner la clase 'active' en el li de Configuración -->
        </div>

        <div id="main">
            <header class="mb-3">
                <a href="#" class="burger-btn d-block d-xl-none">
                    <i class="bi bi-justify fs-3"></i>
                </a>
            </header>

            <div class="page-heading">
                <div class="page-title">
                    <div class="row">
                        <div class="col-12 col-md-6 order-md-1 order-last">
                            <h3>Configuración del Sistema</h3>
                            <p class="text-subtitle text-muted">Ajustes de cuenta y preferencias del laboratorio.</p>
                        </div>
                    </div>
                </div>

                <section class="section">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body">
                                    <!-- Navegación de Pestañas -->
                                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                                        <li class="nav-item" role="presentation">
                                            <a class="nav-link active" id="profile-tab" data-bs-toggle="tab" href="#profile" role="tab" aria-controls="profile" aria-selected="true">Mi Perfil</a>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <a class="nav-link" id="lab-tab" data-bs-toggle="tab" href="#lab" role="tab" aria-controls="lab" aria-selected="false">Datos del Laboratorio</a>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <a class="nav-link" id="security-tab" data-bs-toggle="tab" href="#security" role="tab" aria-controls="security" aria-selected="false">Seguridad</a>
                                        </li>
                                    </ul>

                                    <div class="tab-content" id="myTabContent">
                                        <!-- PESTAÑA PERFIL -->
                                        <div class="tab-pane fade show active py-4" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                                            <div class="row">
                                                <div class="col-md-4 text-center">
                                                    <div class="avatar avatar-xxl mb-3">
                                                        <img src="assets/compiled/jpg/1.jpg" alt="Avatar" style="width: 150px; height: 150px;">
                                                    </div>
                                                    <button class="btn btn-sm btn-outline-primary">Cambiar Foto</button>
                                                </div>
                                                <div class="col-md-8">
                                                    <form action="#">
                                                        <div class="form-group">
                                                            <label>Nombre Completo</label>
                                                            <input type="text" class="form-control" value="Miguel Administrador">
                                                        </div>
                                                        <div class="form-group">
                                                            <label>Correo Electrónico</label>
                                                            <input type="email" class="form-control" value="miguel@biolab.com">
                                                        </div>
                                                        <button class="btn btn-primary mt-2">Guardar Cambios</button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- PESTAÑA LABORATORIO -->
                                        <div class="tab-pane fade py-4" id="lab" role="tabpanel" aria-labelledby="lab-tab">
                                            <form action="#">
                                                <div class="row">
                                                    <div class="col-md-6">
                                                        <div class="form-group">
                                                            <label>Nombre del Laboratorio</label>
                                                            <input type="text" class="form-control" value="BIO-LAB C.A.">
                                                        </div>
                                                    </div>
                                                    <div class="col-md-6">
                                                        <div class="form-group">
                                                            <label>RIF / Identificación Fiscal</label>
                                                            <input type="text" class="form-control" value="J-12345678-9">
                                                        </div>
                                                    </div>
                                                    <div class="col-md-12">
                                                        <div class="form-group">
                                                            <label>Dirección Física</label>
                                                            <textarea class="form-control" rows="2">Av. Principal, Edificio Salud, Piso 1. Cumaná, Venezuela.</textarea>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button class="btn btn-primary">Actualizar Datos</button>
                                            </form>
                                        </div>

                                        <!-- PESTAÑA SEGURIDAD -->
                                        <div class="tab-pane fade py-4" id="security" role="tabpanel" aria-labelledby="security-tab">
                                            <h5>Cambiar Contraseña</h5>
                                            <div class="row mt-3">
                                                <div class="col-md-6">
                                                    <div class="form-group">
                                                        <label>Contraseña Actual</label>
                                                        <input type="password" class="form-control">
                                                    </div>
                                                    <div class="form-group">
                                                        <label>Nueva Contraseña</label>
                                                        <input type="password" class="form-control">
                                                    </div>
                                                    <div class="form-group">
                                                        <label>Confirmar Nueva Contraseña</label>
                                                        <input type="password" class="form-control">
                                                    </div>
                                                </div>
                                            </div>
                                            <button class="btn btn-warning text-white">Actualizar Contraseña</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <footer>
                <div class="footer clearfix mb-0 text-muted">
                    <div class="float-start"><p>2026 &copy; BIO-LAB</p></div>
                    <div class="float-end"><p>Desarrollado por Miguel</p></div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/static/js/components/dark.js"></script>
    <script src="assets/extensions/perfect-scrollbar/perfect-scrollbar.min.js"></script>
    <script src="assets/compiled/js/app.js"></script>
</body>

</html>
