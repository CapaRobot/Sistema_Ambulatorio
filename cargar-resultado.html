<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-LAB - Cargar Resultados</title>
    
    <!-- Estilos de Mazer -->
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app.css">
    <link rel="stylesheet" crossorigin href="./assets/compiled/css/app-dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <script src="assets/static/js/initTheme.js"></script>
    <div id="app">
        <!-- Sidebar (Mantén el mismo que usas en el index) -->
        <div id="sidebar">
            <!-- ... Aquí va todo tu bloque de sidebar ... -->
        </div>

        <div id="main">
            <header class="mb-3">
                <a href="#" class="burger-btn d-block d-xl-none">
                    <i class="bi bi-justify fs-3"></i>
                </a>
            </header>

            <div class="page-heading">
                <div class="page-title">
                    <div class="row">
                        <div class="col-12 col-md-6 order-md-1">
                            <h3>Cargar Resultados</h3>
                            <p class="text-subtitle text-muted">Paciente: <strong class="text-primary">Jose Fernandez</strong></p>
                        </div>
                    </div>
                </div>

                <section class="section">
                    <!-- Selector de Examen -->
                    <div class="card">
                        <div class="card-header bg-light-primary">
                            <h4 class="card-title">1. Selección de Formato</h4>
                        </div>
                        <div class="card-body mt-3">
                            <div class="row">
                                <div class="col-md-8">
                                    <div class="form-group">
                                        <label for="tipoExamen" class="form-label font-bold">Tipo de Examen Realizado:</label>
                                        <select class="form-select" id="tipoExamen">
                                            <option value="hematologia">Hematología Completa</option>
                                            <option value="orina">Examen de Orina (Uroanálisis)</option>
                                            <option value="quimica">Química Sanguínea</option>
                                            <option value="perfil20">Perfil 20</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-4 d-flex align-items-end">
                                    <button class="btn btn-primary w-100 mb-3">
                                        <i class="bi bi-file-earmark-arrow-down"></i> Cargar Formulario
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Formulario de Entrada de Datos -->
                    <div class="card">
                        <div class="card-header bg-light-success">
                            <h4 class="card-title">2. Resultados de Laboratorio</h4>
                        </div>
                        <div class="card-body mt-3">
                            <form action="#">
                                <!-- Sección de Parámetros -->
                                <div class="row">
                                    <div class="col-12 border-bottom mb-4">
                                        <h5 class="text-secondary"><i class="bi bi-droplet-fill text-danger"></i> Serie Roja</h5>
                                    </div>
                                    
                                    <div class="col-md-4 mb-3">
                                        <div class="form-group">
                                            <label class="form-label">Hemoglobina (gr/dL)</label>
                                            <div class="input-group">
                                                <input type="number" step="0.1" class="form-control" placeholder="Ej: 14.5">
                                                <span class="input-group-text">gr/dL</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <div class="form-group">
                                            <label class="form-label">Hematocrito (%)</label>
                                            <div class="input-group">
                                                <input type="number" step="0.1" class="form-control" placeholder="Ej: 42.0">
                                                <span class="input-group-text">%</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <div class="form-group">
                                            <label class="form-label">Rto. Glóbulos Rojos</label>
                                            <div class="input-group">
                                                <input type="text" class="form-control" placeholder="Ej: 5.2">
                                                <span class="input-group-text">x10^6/uL</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-12 border-bottom mt-4 mb-4">
                                        <h5 class="text-secondary"><i class="bi bi-chat-left-text"></i> Observaciones y Notas</h5>
                                    </div>
                                    <div class="col-12 mb-3">
                                        <textarea class="form-control" rows="3" placeholder="Indique aquí cualquier anomalía observada en el frotis sanguíneo..."></textarea>
                                    </div>

                                    <!-- Acciones Finales -->
                                    <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                                        <button type="button" class="btn btn-light-secondary">
                                            <i class="bi bi-x-circle"></i> Cancelar
                                        </button>
                                        <!-- El botón de Word que pediste -->
                                        <button type="submit" class="btn btn-success">
                                            <i class="bi bi-file-earmark-word"></i> Generar Reporte Word
                                        </button>
                                        <button type="button" class="btn btn-primary">
                                            <i class="bi bi-printer"></i> Imprimir PDF
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>

            <footer>
                <div class="footer clearfix mb-0 text-muted">
                    <div class="float-start"><p>2026 &copy; BIO-LAB</p></div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Scripts necesarios para el funcionamiento de Mazer -->
    <script src="assets/compiled/js/app.js"></script>
</body>
</html>
